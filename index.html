<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aplicación de rifa con generación de boletos" />
    <meta name="theme-color" content="#6366f1" />
    <title>Sorteo - Gestión de Rifa</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <div class="header__container">
        <div class="header__brand">
          <h1 class="header__titulo">
            <svg
              class="header__icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 2L2 7l10 5 10-5-10-5z" />
              <path d="M2 17l10 5 10-5" />
              <path d="M2 12l10 5 10-5" />
            </svg>
            Sorteo
          </h1>
          <p class="header__descripcion">Gestión de rifa</p>
        </div>
        <div class="header__actions">
          <button id="btn-exportar" class="btn btn--outline" title="Exportar datos">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Exportar
          </button>
          <label id="btn-importar" class="btn btn--outline" title="Importar datos">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Importar
            <input type="file" id="input-importar" accept=".json" style="display: none" />
          </label>
        </div>
      </div>
    </header>

    <main class="main">
      <section id="configuracion" class="seccion seccion--collapsible">
        <button class="seccion__toggle" aria-expanded="false">
          <h2 class="seccion__titulo">
            <svg
              class="seccion__icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
            Configuración
          </h2>
          <svg
            class="seccion__arrow"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </button>
        <div class="seccion__contenido" id="configuracion-contenido">
          <form id="form-configuracion" class="form form--grid">
            <div class="form__grupo">
              <label for="descripcion" class="form__label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                  <polyline points="14 2 14 8 20 8" />
                  <line x1="16" y1="13" x2="8" y2="13" />
                  <line x1="16" y1="17" x2="8" y2="17" />
                </svg>
                Descripción de la rifa
              </label>
              <input
                type="text"
                id="descripcion"
                name="descripcion"
                class="form__input"
                placeholder="Ej: Rifa de Navidad 2024"
                required
              />
            </div>
            <div class="form__grupo">
              <label for="precio" class="form__label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="12" y1="1" x2="12" y2="23" />
                  <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                </svg>
                Precio del boleto
              </label>
              <div class="form__input-group">
                <span class="form__input-prefix">$</span>
                <input
                  type="number"
                  id="precio"
                  name="precio"
                  class="form__input form__input--with-prefix"
                  min="0"
                  step="0.01"
                  placeholder="0.00"
                  required
                />
              </div>
            </div>
            <div class="form__acciones">
              <button type="submit" class="btn btn--primario btn--full">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                  <polyline points="17 21 17 13 7 13 7 21" />
                  <polyline points="7 3 7 8 15 8" />
                </svg>
                Guardar Configuración
              </button>
            </div>
          </form>
        </div>
      </section>

      <section id="registro" class="seccion">
        <h2 class="seccion__titulo">
          <svg
            class="seccion__icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="8.5" cy="7" r="4" />
            <line x1="20" y1="8" x2="20" y2="14" />
            <line x1="23" y1="11" x2="17" y2="11" />
          </svg>
          Registrar Participante
        </h2>
        <form id="form-participante" class="form form--grid">
          <div class="form__grupo">
            <label for="nombre" class="form__label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              Nombre completo
            </label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              class="form__input"
              placeholder="Ej: Juan Pérez"
              required
            />
          </div>
          <div class="form__grupo">
            <label for="telefono" class="form__label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                  d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"
                />
              </svg>
              Teléfono
            </label>
            <input
              type="tel"
              id="telefono"
              name="telefono"
              class="form__input"
              placeholder="Ej: 55 1234 5678"
              required
            />
          </div>
          <div class="form__grupo">
            <label for="numero" class="form__label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                <line x1="9" y1="9" x2="15" y2="9" />
                <line x1="9" y1="15" x2="15" y2="15" />
              </svg>
              Número (0-99)
            </label>
            <input
              type="number"
              id="numero"
              name="numero"
              class="form__input form__input--numero"
              min="0"
              max="99"
              placeholder="0-99"
              required
            />
          </div>
          <div class="form__grupo">
            <label class="form__label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
                <line x1="1" y1="10" x2="23" y2="10" />
              </svg>
              Estado de pago
            </label>
            <div class="form__radio-grupo">
              <label class="form__radio form__radio--card">
                <input type="radio" name="pago" value="pendiente" checked />
                <span class="form__radio-content">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                  </svg>
                  Pendiente
                </span>
              </label>
              <label class="form__radio form__radio--card">
                <input type="radio" name="pago" value="pagado" />
                <span class="form__radio-content">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                  </svg>
                  Pagado
                </span>
              </label>
            </div>
          </div>
          <div class="form__acciones">
            <button type="submit" class="btn btn--primario btn--full">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                <circle cx="8.5" cy="7" r="4" />
                <line x1="20" y1="8" x2="20" y2="14" />
                <line x1="23" y1="11" x2="17" y2="11" />
              </svg>
              Registrar Participante
            </button>
          </div>
        </form>
      </section>

      <section id="participantes" class="seccion">
        <div class="seccion__header">
          <h2 class="seccion__titulo">
            <svg
              class="seccion__icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            Participantes
            <span id="contador-participantes" class="seccion__contador">0</span>
          </h2>
        </div>
        <div id="lista-participantes" class="lista-participantes"></div>
      </section>

      <section id="numeros-disponibles" class="seccion">
        <div class="seccion__header">
          <h2 class="seccion__titulo">
            <svg
              class="seccion__icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
            </svg>
            Números Disponibles
          </h2>
          <div class="seccion__stats">
            <span id="numeros-ocupados" class="badge badge--success">0 vendidos</span>
            <span id="numeros-libres" class="badge badge--info">100 disponibles</span>
          </div>
        </div>
        <div id="grilla-numeros" class="grilla-numeros"></div>
      </section>
    </main>

    <div id="modal-ticket" class="modal">
      <div class="modal__contenido">
        <button id="cerrar-modal" class="modal__cerrar" aria-label="Cerrar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
        <div class="modal__header">
          <h3>Ticket del Participante</h3>
          <p id="ticket-nombre-participante"></p>
        </div>
        <div id="ticket-container" class="ticket"></div>
        <div class="modal__actions">
          <button id="btn-descargar-ticket" class="btn btn--primario btn--icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Descargar Imagen
          </button>
          <button id="btn-compartir-ticket" class="btn btn--secundario btn--icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="18" cy="5" r="3" />
              <circle cx="6" cy="12" r="3" />
              <circle cx="18" cy="19" r="3" />
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
            </svg>
            Compartir
          </button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>Hecho con ❤️ para gestionar rifas</p>
    </footer>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
